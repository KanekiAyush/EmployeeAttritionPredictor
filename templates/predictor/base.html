{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>{% block title %}AttritionIQ{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg:        #0a0a0f;
    --surface:   #13131e;
    --card:      #1a1a2e;
    --border:    rgba(255,255,255,0.07);
    --accent:    #e8ff47;
    --accent2:   #ff6b6b;
    --accent3:   #47c8ff;
    --text:      #f0f0f8;
    --muted:     #7070a0;
    --grad:      linear-gradient(135deg, #e8ff47 0%, #47c8ff 100%);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 10% 20%, rgba(232,255,71,0.04) 0%, transparent 50%),
      radial-gradient(ellipse at 90% 80%, rgba(71,200,255,0.04) 0%, transparent 50%);
  }

  /* ── Navbar ── */
  nav {
    position: sticky; top:0; z-index:100;
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex; align-items: center; justify-content: space-between;
    height: 64px;
  }
  .nav-logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800; font-size: 1.3rem;
    background: var(--grad);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    text-decoration: none;
  }
  .nav-links { display:flex; gap:2rem; }
  .nav-links a {
    color: var(--muted); text-decoration:none;
    font-size:0.9rem; font-weight:500;
    transition: color .2s;
    position: relative; padding-bottom: 4px;
  }
  .nav-links a:hover, .nav-links a.active { color: var(--text); }
  .nav-links a.active::after {
    content:''; position:absolute; bottom:0; left:0; right:0;
    height:2px; background: var(--accent); border-radius:2px;
  }

  /* ── Buttons ── */
  .btn {
    display: inline-flex; align-items:center; gap:.5rem;
    padding: .75rem 1.75rem; border-radius: 8px;
    font-family:'DM Sans',sans-serif; font-weight:500; font-size:.95rem;
    cursor:pointer; border:none; text-decoration:none;
    transition: all .2s;
  }
  .btn-primary {
    background: var(--accent); color: #0a0a0f;
  }
  .btn-primary:hover { background: #f5ff80; transform: translateY(-1px); }
  .btn-outline {
    background: transparent; color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Cards ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.75rem;
  }
  .card-sm { padding: 1.25rem; border-radius: 12px; }

  /* ── Stat tiles ── */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 1rem;
  }
  .stat-tile {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    position: relative; overflow: hidden;
  }
  .stat-tile::before {
    content:''; position:absolute; top:0; left:0; right:0;
    height: 3px;
  }
  .stat-tile.yellow::before { background: var(--accent); }
  .stat-tile.red::before    { background: var(--accent2); }
  .stat-tile.blue::before   { background: var(--accent3); }
  .stat-tile.green::before  { background: #47ffa0; }

  .stat-label { font-size:.8rem; color:var(--muted); font-weight:500;
                text-transform:uppercase; letter-spacing:.08em; }
  .stat-value { font-family:'Syne',sans-serif; font-size:2.2rem;
                font-weight:800; margin: .4rem 0 .2rem; }
  .stat-sub   { font-size:.8rem; color:var(--muted); }

  /* ── Section title ── */
  .section-title {
    font-family:'Syne',sans-serif; font-weight:700; font-size:1.2rem;
    margin-bottom:1.25rem;
    display:flex; align-items:center; gap:.6rem;
  }
  .section-title::before {
    content:''; width:4px; height:1.2rem;
    background:var(--accent); border-radius:4px;
  }

  /* ── Layout ── */
  .container { max-width:1280px; margin:0 auto; padding:2rem; }
  .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:1.5rem; }
  .grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:1.5rem; }

  /* ── Feature bar ── */
  .feat-bar-wrap { margin-bottom:.65rem; }
  .feat-bar-label { display:flex; justify-content:space-between;
                    font-size:.82rem; margin-bottom:.3rem; }
  .feat-bar-track {
    height:6px; background:rgba(255,255,255,0.07); border-radius:99px;
  }
  .feat-bar-fill {
    height:6px; border-radius:99px;
    background: var(--grad);
    transition: width 1s cubic-bezier(.16,1,.3,1);
  }

  @media(max-width:768px){
    .grid-2,.grid-3 { grid-template-columns:1fr; }
    .nav-links { display:none; }
  }
</style>
{% block extra_head %}{% endblock %}
</head>
<body>

<nav>
  <a href="/" class="nav-logo">⬡ AttritionIQ</a>
  <div class="nav-links">
    <a href="/" class="{% if request.path == '/' %}active{% endif %}">Dashboard</a>
    <a href="/predict/" class="{% if '/predict' in request.path %}active{% endif %}">Predict</a>
  </div>
</nav>

{% block content %}{% endblock %}

</body>
</html>
